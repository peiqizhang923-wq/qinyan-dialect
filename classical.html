<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大唐雅言 · 秦言三韵</title>

<style>
/* ================================================================
   大唐雅言专属样式
   ================================================================ */
.cls-layout { display:flex; justify-content:center; padding:32px 12px 48px; position:relative; }
.cls-main { width:100%; max-width:1100px; }

/* ---- 圣旨卷轴容器 ---- */
.scroll-wrap {
    position:relative; border-radius:4px; overflow:hidden;
    padding:60px 80px 60px;
    min-height:400px; display:flex; flex-direction:column;
    width:100%; background-color:#F5EFE0;
    box-shadow:
        0 4px 16px rgba(35,24,18,0.08),
        0 12px 32px rgba(35,24,18,0.1),
        0 24px 56px rgba(35,24,18,0.08);
}
.scroll-inner {
    position:relative; z-index:1; flex:1;
}
/* 输入区 textarea */
.scroll-textarea {
    width:100%; height:120px; resize:vertical;
    background:transparent; border:none; outline:none;
    font-size:28px; font-family:'STKaiti','KaiTi',serif;
    color:#1A110B; font-weight:600; line-height:2;
    caret-color:var(--red);
}
.scroll-textarea::placeholder { color:rgba(90,60,40,0.3); font-weight:400; font-size:24px; }
/* 卷轴内部分割线 */
.scroll-divider {
    width:100%; height:1px; margin:32px 0 24px;
    background:linear-gradient(90deg, transparent, rgba(139,105,20,0.2), transparent);
}

/* ---- 输出区（竖排文言）---- */
.scroll-output {
    position:relative; z-index:1;
    display:none; overflow:hidden; padding:32px 60px 40px;
    border:1px solid rgba(191,149,48,0.15);
    border-radius:6px; margin:16px 0 0;
}
.scroll-output::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:repeating-linear-gradient(90deg,
        rgba(191,149,48,0.4) 0px, rgba(191,149,48,0.4) 12px,
        transparent 12px, transparent 18px,
        rgba(180,140,60,0.25) 18px, rgba(180,140,60,0.25) 22px,
        transparent 22px, transparent 28px);
    z-index:2;
}
.scroll-output::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
    background:repeating-linear-gradient(90deg,
        rgba(191,149,48,0.4) 0px, rgba(191,149,48,0.4) 12px,
        transparent 12px, transparent 18px,
        rgba(180,140,60,0.25) 18px, rgba(180,140,60,0.25) 22px,
        transparent 22px, transparent 28px);
    z-index:2;
}
.scroll-output.show {
    display:flex; justify-content:center; align-items:center;
    animation:inkReveal 0.8s ease-out;
}
@keyframes inkReveal {
    from { opacity:0; filter:blur(5px); }
    to   { opacity:1; filter:blur(0); }
}
.output-classical {
    font-size:28px; font-family:'STKaiti','KaiTi',serif;
    color:#1A110B; font-weight:700;
    letter-spacing:6px; line-height:2.2;
    writing-mode:vertical-rl;
    max-height:480px; max-width:100%;
    padding:12px 0;
}

/* ---- 官印按钮 ---- */
.seal-btn-wrap {
    display:flex; justify-content:center; margin-top:36px; padding-bottom:8px;
    position:relative; z-index:1;
}
.seal-btn {
    display:inline-block; border:none; background:transparent; cursor:pointer;
    padding:0; position:relative;
    transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
    box-shadow:
        0 4px 12px rgba(35,24,18,0.12),
        0 8px 28px rgba(35,24,18,0.1);
    border-radius:4px;
}
.seal-btn img {
    display:block; width:90px; height:auto;
    filter:brightness(1) contrast(1.1);
    transition:filter 0.3s;
}
.seal-btn:hover {
    transform:translateY(-2px);
    box-shadow:
        0 6px 18px rgba(35,24,18,0.15),
        0 12px 32px rgba(35,24,18,0.12);
}
.seal-btn:hover img { filter:brightness(1.05) contrast(1.15); }
.seal-btn:active {
    transform:scale(0.95) translateY(6px);
    box-shadow:
        0 1px 4px rgba(35,24,18,0.2),
        0 2px 8px rgba(35,24,18,0.15);
    transition:transform 0.12s cubic-bezier(0.4,0,0.2,1), box-shadow 0.12s cubic-bezier(0.4,0,0.2,1);
}
.seal-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.seal-btn .seal-label {
    display:block; text-align:center; margin-top:8px;
    font-size:15px; color:var(--brown); letter-spacing:3px;
    font-family:'STKaiti','KaiTi',serif; font-weight:600;
}

/* ---- 熏炉加载 ---- */
.censer-loader {
    display:flex; flex-direction:column; align-items:center; gap:8px;
    margin-top:32px;
}
.censer-loader img {
    width:60px; height:auto;
    animation:censerFloat 2.4s cubic-bezier(0.45,0,0.55,1) infinite;
    filter:drop-shadow(0 2px 6px rgba(35,24,18,0.15));
}
@keyframes censerFloat {
    0%,100%{ opacity:0.7; transform:translateY(0); }
    50%{ opacity:1; transform:translateY(-3px); }
}
.censer-loader .loader-text {
    font-size:18px; color:var(--brown-l); letter-spacing:2px;
    font-family:'STKaiti','KaiTi',serif;
}

/* ---- 案头悬笔 ---- */
.brush-deco {
    position:absolute; right:-160px; top:180px;
    width:380px; height:auto; z-index:-1; pointer-events:none;
    opacity:0.2;
    filter:drop-shadow(0 4px 12px rgba(35,24,18,0.1));
    animation:brushSway 5s ease-in-out infinite;
}
@keyframes brushSway {
    0%,100%{ transform:rotate(-2deg); }
    50%{ transform:rotate(1deg); }
}

/* 状态行 */
/* ---- 景点选择 ---- */
.spots-scroll {
    display:flex; gap:10px; overflow-x:auto; padding:10px 4px 12px;
    scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
    scrollbar-width:thin; scrollbar-color:rgba(191,149,48,0.2) transparent;
}
.spots-scroll::-webkit-scrollbar { height:4px; }
.spots-scroll::-webkit-scrollbar-thumb { background:rgba(191,149,48,0.25); border-radius:2px; }
.spot-chip {
    flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:8px;
    padding:12px 16px 14px; border-radius:10px;
    border:1.5px solid rgba(191,149,48,0.15); background:var(--white);
    font-size:18px; font-family:'STKaiti','KaiTi',serif;
    color:var(--ink); cursor:pointer; transition:all 0.2s;
    white-space:nowrap; font-weight:600; min-width:100px;
    box-shadow:0 1px 4px rgba(35,24,18,0.03);
}
.spot-thumb {
    width:80px; height:56px; border-radius:6px; object-fit:cover;
    box-shadow:0 2px 6px rgba(35,24,18,0.1);
}
.spot-chip:hover { border-color:var(--gold); background:#FFFDF4; transform:translateY(-2px); }
.spot-chip:active { transform:scale(0.95); background:var(--gold-l); }

.status-line { text-align:center; margin-top:16px; font-size:22px; color:var(--brown-l); }

@media(max-width:700px){
    .cls-layout{ padding:16px 12px 32px; }
    .scroll-wrap{ padding:48px 40px 48px; min-height:500px; }
    .output-classical{ font-size:22px; letter-spacing:4px; max-height:340px; }
    .scroll-textarea{ font-size:22px; }
    .brush-deco{ right:-80px; width:160px; top:200px; opacity:0.15; }
    .seal-btn img{ width:70px; }
}
</style>
</head>

<main class="main">
<div class="top-bar"><span class="title">大唐雅言</span></div>

<div class="cls-layout">
    <div class="cls-main">
        <!-- 圣旨卷轴 -->
        <div class="scroll-wrap" id="scrollWrap">
            <div class="scroll-inner" id="scrollInput">
                <textarea id="input3" class="scroll-textarea" placeholder="输入现代文旅文案，如：西安大雁塔，千年古塔巍然矗立……"></textarea>
                <div class="scroll-divider"></div>
                <!-- 官印按钮 -->
                <div class="seal-btn-wrap">
                    <button class="seal-btn" id="btnClassical" onclick="toClassical()">
                        <img src="img/seal-btn.png" alt="盖印转换">
                        <span class="seal-label">盖 印 转 换</span>
                    </button>
                </div>
            </div>
            <!-- 竖排输出 -->
            <div class="scroll-output" id="result3">
                <div class="output-classical" id="resultText3"></div>
            </div>
        </div>

        <!-- 熏炉加载（隐藏默认） -->
        <div class="censer-loader" id="censerLoader" style="display:none;">
            <img src="img/censer.png" alt="加载中">
            <span class="loader-text">青烟袅袅 · 文思酝酿中</span>
        </div>

        <!-- 长安胜迹 · 景点选择 -->
        <div style="margin-top:24px;">
            <div style="font-size:18px;color:var(--brown);letter-spacing:3px;margin-bottom:12px;font-family:'STKaiti','KaiTi',serif;text-align:center;">🏯 长安胜迹 · 点击填入</div>
            <div class="spots-scroll" id="spotsScroll">
                <button class="spot-chip" onclick="pickSpot('大雁塔')"><img src="img/spots/大雁塔.jpg" class="spot-thumb" alt="">大雁塔</button>
                <button class="spot-chip" onclick="pickSpot('秦始皇兵马俑')"><img src="img/spots/秦始皇兵马俑.jpg" class="spot-thumb" alt="">兵马俑</button>
                <button class="spot-chip" onclick="pickSpot('钟楼')"><img src="img/spots/钟楼.jpg" class="spot-thumb" alt="">钟楼</button>
                <button class="spot-chip" onclick="pickSpot('鼓楼')"><img src="img/spots/鼓楼.jpg" class="spot-thumb" alt="">鼓楼</button>
                <button class="spot-chip" onclick="pickSpot('西安城墙')"><img src="img/spots/西安城墙.jpg" class="spot-thumb" alt="">古城墙</button>
                <button class="spot-chip" onclick="pickSpot('华山')"><img src="img/spots/华山.jpg" class="spot-thumb" alt="">华山</button>
                <button class="spot-chip" onclick="pickSpot('法门寺')"><img src="img/spots/法门寺.jpg" class="spot-thumb" alt="">法门寺</button>
                <button class="spot-chip" onclick="pickSpot('小雁塔')"><img src="img/spots/小雁塔.jpg" class="spot-thumb" alt="">小雁塔</button>
                <button class="spot-chip" onclick="pickSpot('大唐不夜城')"><img src="img/spots/大唐不夜城.jpg" class="spot-thumb" alt="">大唐不夜城</button>
                <button class="spot-chip" onclick="pickSpot('壶口瀑布')"><img src="img/spots/壶口瀑布.jpg" class="spot-thumb" alt="">壶口瀑布</button>
                <button class="spot-chip" onclick="pickSpot('乾陵')"><img src="img/spots/乾陵.jpg" class="spot-thumb" alt="">乾陵</button>
            </div>
        </div>

        <!-- 语音 + 重写按钮 -->
        <div style="display:flex;gap:16px;justify-content:center;margin-top:28px;flex-wrap:wrap;">
            <button class="btn btn-jade" id="voiceBtn3" onclick="playVoice('resultText3','voiceBtn3','classical')" style="max-width:320px;">🔊 吟诵古雅言</button>
            <button class="btn btn-gold" id="resetBtn" onclick="resetInput()" style="max-width:200px;display:none;">✍️ 重新书写</button>
        </div>
        <div style="height:40px"></div>

        <p class="status-line">状态：<span id="apiStatus">就绪</span></p>
    </div>

    <!-- 案头悬笔 -->
    <img src="img/brush.png" class="brush-deco" alt="">
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
document.getElementById('voiceBtn3').dataset.voiceStyle='classical';

var spotNames = { '兵马俑':'秦始皇兵马俑', '古城墙':'西安城墙' };
function pickSpot(name){
    var full = spotNames[name] || name;
    document.getElementById('input3').value = full + '，';
    document.getElementById('input3').focus();
}

async function toClassical(){SFX.stamp();
    var input = document.getElementById('input3').value.trim();
    if(!input){ alert('请先输入文旅文案'); return; }

    var btn = document.getElementById('btnClassical');
    var loader = document.getElementById('censerLoader');
    var scrollWrap = document.getElementById('scrollWrap');

    btn.disabled = true;
    btn.style.opacity = '0.4';
    document.getElementById('result3').classList.remove('show');
    document.getElementById('resetBtn').style.display = 'none';
    loader.style.display = 'flex';

    try{
        var r = await callAI(PROMPTS.classical, input);
        document.getElementById('resultText3').textContent = r;
        document.getElementById('result3').classList.add('show');
        document.getElementById('resetBtn').style.display = 'inline-flex';
        var vb = document.getElementById('voiceBtn3');
        vb.dataset.voiceText = r;
    }catch(e){
        alert('转化失败: ' + e.message);
    }finally{
        btn.disabled = false;
        btn.style.opacity = '1';
        loader.style.display = 'none';
    }

}
function resetInput(){
    document.getElementById('result3').classList.remove('show');
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('input3').value = '';
    document.getElementById('input3').focus();
}

function fadeTo(u){
    document.body.style.opacity='0';
    document.body.style.transition='opacity 0.15s cubic-bezier(0.22,1,0.36,1)';
    setTimeout(function(){ window.location.href=u; },150);
}
document.querySelectorAll('.sidebar-nav a').forEach(function(a){
    a.addEventListener('click',function(e){ e.preventDefault(); fadeTo(this.getAttribute('href')); });
});
</script>
</body>
